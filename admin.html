<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor IPTV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; }
    header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 24px; }
    .btn-logout { background: rgba(255,255,255,0.2); padding: 8px 16px; border: none; color: white; border-radius: 5px; cursor: pointer; }
    .container { display: flex; min-height: calc(100vh - 70px); }
    .sidebar { width: 200px; background: white; border-right: 1px solid #ddd; }
    .sidebar button { width: 100%; padding: 15px; background: none; border: none; text-align: left; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
    .sidebar button:hover { background: #f0f0f0; }
    .sidebar button.active { background: #e8eaf6; color: #667eea; font-weight: 600; }
    .main { flex: 1; padding: 20px; overflow-y: auto; }
    .tab { display: none; }
    .tab.active { display: block; }
    .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .cards-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
    @media (max-width: 1200px) { .cards-row { grid-template-columns: repeat(2, 1fr); } }
    .card-stat { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; text-align: center; }
    .card-stat h3 { font-size: 28px; margin-bottom: 10px; }
    .card-stat p { font-size: 12px; opacity: 0.9; }
    h2 { margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
    th { background: #f9f9f9; font-weight: 600; }
    .btn { padding: 8px 12px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; }
    .btn:hover { background: #764ba2; }
    .btn-success { background: #27ae60; }
    .btn-danger { background: #e74c3c; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 30px; border-radius: 10px; max-width: 500px; width: 90%; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 15px 20px; border-radius: 5px; display: none; z-index: 2000; }
    .toast.show { display: block; }
    .toast.error { background: #e74c3c; }
  </style>
</head>
<body>
  <header>
    <h1>🎬 Gestor IPTV</h1>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </header>

  <div class="container">
    <div class="sidebar">
      <button class="tab-btn active" onclick="mudarAba(0)">📱 Clientes</button>
      <button class="tab-btn" onclick="mudarAba(1)">🖥️ Servidores</button>
      <button class="tab-btn" onclick="mudarAba(2)">💰 Planos</button>
      <button class="tab-btn" onclick="mudarAba(3)">📤 Cobrança</button>
      <button class="tab-btn" onclick="mudarAba(4)">📊 Financeiro</button>
    </div>

    <div class="main">
      <!-- ABA 0: CLIENTES -->
      <div class="tab active">
        <h2>📱 Clientes</h2>
        <div class="cards-row">
          <div class="card-stat">
            <h3 id="s0">0</h3>
            <p>Ativos</p>
          </div>
          <div class="card-stat">
            <h3 id="s1">0</h3>
            <p>Vencendo</p>
          </div>
          <div class="card-stat">
            <h3 id="s2">0</h3>
            <p>Hoje</p>
          </div>
          <div class="card-stat">
            <h3 id="s3">0</h3>
            <p>Vencido</p>
          </div>
        </div>
        <div class="card">
          <button class="btn btn-success" onclick="abrirCliente()">+ Novo</button>
          <table style="margin-top: 20px;">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Servidor</th>
                <th>Plano</th>
                <th>Vencimento</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tb0"></tbody>
          </table>
        </div>
      </div>

      <!-- ABA 1: SERVIDORES -->
      <div class="tab">
        <h2>🖥️ Servidores</h2>
        <button class="btn btn-success" onclick="abrirServidor()">+ Novo</button>
        <table style="margin-top: 20px;">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tb1"></tbody>
        </table>
      </div>

      <!-- ABA 2: PLANOS -->
      <div class="tab">
        <h2>💰 Planos</h2>
        <button class="btn btn-success" onclick="abrirPlano()">+ Novo</button>
        <table style="margin-top: 20px;">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Valor</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tb2"></tbody>
        </table>
      </div>

      <!-- ABA 3: COBRANÇA -->
      <div class="tab">
        <h2>📤 Cobrança</h2>
        <div class="card">
          <div class="form-group">
            <label>Cliente:</label>
            <select id="sel-cliente"></select>
          </div>
          <div class="form-group">
            <label>Mensagem:</label>
            <textarea id="txt-msg" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; min-height: 80px; font-family: inherit;"></textarea>
          </div>
          <button class="btn btn-success" onclick="enviarMsg()">Enviar</button>
        </div>
      </div>

      <!-- ABA 4: FINANCEIRO -->
      <div class="tab">
        <h2>📊 Financeiro</h2>
        <div class="cards-row">
          <div class="card-stat">
            <h3 id="f0">R$ 0</h3>
            <p>Total</p>
          </div>
          <div class="card-stat">
            <h3 id="f1">R$ 0</h3>
            <p>Ativo</p>
          </div>
          <div class="card-stat">
            <h3 id="f2">R$ 0</h3>
            <p>Vencendo</p>
          </div>
          <div class="card-stat">
            <h3 id="f3">R$ 0</h3>
            <p>Vencido</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAIS -->
  <div class="modal" id="m-cliente">
    <div class="modal-content">
      <h3>Novo Cliente</h3>
      <form onsubmit="salvarCliente(event)">
        <div class="form-group">
          <label>Nome:</label>
          <input type="text" id="f-nome" required>
        </div>
        <div class="form-group">
          <label>Email:</label>
          <input type="email" id="f-email" required>
        </div>
        <div class="form-group">
          <label>WhatsApp:</label>
          <input type="text" id="f-whatsapp" required>
        </div>
        <div class="form-group">
          <label>Servidor:</label>
          <select id="f-servidor" required></select>
        </div>
        <div class="form-group">
          <label>Plano:</label>
          <select id="f-plano" required></select>
        </div>
        <div class="form-group">
          <label>Vencimento:</label>
          <input type="date" id="f-vencimento" required>
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn" onclick="fechar('m-cliente')">Cancelar</button>
          <button type="submit" class="btn btn-success">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="m-servidor">
    <div class="modal-content">
      <h3>Novo Servidor</h3>
      <form onsubmit="salvarServidor(event)">
        <div class="form-group">
          <label>Nome:</label>
          <input type="text" id="f-srv-nome" required>
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn" onclick="fechar('m-servidor')">Cancelar</button>
          <button type="submit" class="btn btn-success">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="m-plano">
    <div class="modal-content">
      <h3>Novo Plano</h3>
      <form onsubmit="salvarPlano(event)">
        <div class="form-group">
          <label>Nome:</label>
          <input type="text" id="f-pln-nome" required>
        </div>
        <div class="form-group">
          <label>Valor:</label>
          <input type="number" id="f-pln-valor" step="0.01" required>
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn" onclick="fechar('m-plano')">Cancelar</button>
          <button type="submit" class="btn btn-success">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

  <script>
    var cfg = {
      apiKey: "AIzaSyB5Y2BMqHIBDAhZoHFwDzdG-UuvPR1-FcQ",
      authDomain: "gestor-22b13.firebaseapp.com",
      databaseURL: "https://gestor-22b13-default-rtdb.firebaseio.com",
      projectId: "gestor-22b13",
      storageBucket: "gestor-22b13.firebasestorage.app",
      messagingSenderId: "124521158946",
      appId: "1:124521158946:web:06ea51762e01c571512d7b"
    };

    firebase.initializeApp(cfg);
    var db = firebase.database();

    var clientes = {};
    var servidores = {};
    var planos = {};

    if (localStorage.getItem('auth') !== 'ok') {
      window.location.href = 'index.html';
    }

    function logout() {
      localStorage.removeItem('auth');
      window.location.href = 'index.html';
    }

    function mudarAba(n) {
      var tabs = document.querySelectorAll('.tab');
      var btns = document.querySelectorAll('.tab-btn');
      tabs.forEach(function(t) { t.classList.remove('active'); });
      btns.forEach(function(b) { b.classList.remove('active'); });
      tabs[n].classList.add('active');
      btns[n].classList.add('active');
    }

    function abrirCliente() {
      document.getElementById('m-cliente').classList.add('active');
      carregarServidores('f-servidor');
      carregarPlanos('f-plano');
    }

    function abrirServidor() {
      document.getElementById('m-servidor').classList.add('active');
    }

    function abrirPlano() {
      document.getElementById('m-plano').classList.add('active');
    }

    function fechar(id) {
      document.getElementById(id).classList.remove('active');
    }

    function salvarCliente(e) {
      e.preventDefault();
      var id = 'cli_' + Date.now();
      var val = document.getElementById('f-plano').selectedOptions[0].dataset.valor || '0';
      var d = {
        nome: document.getElementById('f-nome').value,
        email: document.getElementById('f-email').value,
        whatsapp: document.getElementById('f-whatsapp').value,
        servidor: document.getElementById('f-servidor').value,
        plano: document.getElementById('f-plano').value,
        vencimento: document.getElementById('f-vencimento').value,
        valorPlano: val
      };
      db.ref('clientes/' + id).set(d);
      db.ref('renovacoes/ren_' + Date.now()).set({
        clienteId: id,
        clienteNome: d.nome,
        valor: val,
        data: new Date().toISOString().split('T')[0],
        novoVencimento: d.vencimento
      });
      clientes[id] = d;
      fechar('m-cliente');
      render();
      toast('Cliente salvo!');
    }

    function salvarServidor(e) {
      e.preventDefault();
      var id = 'srv_' + Date.now();
      var n = document.getElementById('f-srv-nome').value;
      db.ref('servidores/' + id).set({ nome: n });
      servidores[id] = { nome: n };
      fechar('m-servidor');
      render();
      toast('Servidor salvo!');
    }

    function salvarPlano(e) {
      e.preventDefault();
      var id = 'pln_' + Date.now();
      var d = {
        nome: document.getElementById('f-pln-nome').value,
        valor: document.getElementById('f-pln-valor').value
      };
      db.ref('planos/' + id).set(d);
      planos[id] = d;
      fechar('m-plano');
      render();
      toast('Plano salvo!');
    }

    function deletarCliente(id) {
      if (confirm('Deletar?')) {
        db.ref('clientes/' + id).remove();
        delete clientes[id];
        render();
      }
    }

    function deletarServidor(id) {
      if (confirm('Deletar?')) {
        db.ref('servidores/' + id).remove();
        delete servidores[id];
        render();
      }
    }

    function deletarPlano(id) {
      if (confirm('Deletar?')) {
        db.ref('planos/' + id).remove();
        delete planos[id];
        render();
      }
    }

    function carregarServidores(sel) {
      var s = document.getElementById(sel);
      s.innerHTML = '';
      Object.values(servidores).forEach(function(srv) {
        s.innerHTML += '<option>' + srv.nome + '</option>';
      });
    }

    function carregarPlanos(sel) {
      var s = document.getElementById(sel);
      s.innerHTML = '';
      Object.entries(planos).forEach(function(p) {
        s.innerHTML += '<option data-valor="' + p[1].valor + '">' + p[1].nome + '</option>';
      });
    }

    function render() {
      renderClientes();
      renderServidores();
      renderPlanos();
      stats();
      carregarServidores('f-servidor');
      carregarPlanos('f-plano');
      carregarClientesCobranca();
    }

    function renderClientes() {
      var tb = document.getElementById('tb0');
      tb.innerHTML = '';
      Object.entries(clientes).forEach(function(c) {
        tb.innerHTML += '<tr><td>' + c[1].nome + '</td><td>' + c[1].email + '</td><td>' + c[1].servidor + '</td><td>' + c[1].plano + '</td><td>' + c[1].vencimento + '</td><td><button class="btn btn-danger" onclick="deletarCliente(\'' + c[0] + '\')">Del</button></td></tr>';
      });
    }

    function renderServidores() {
      var tb = document.getElementById('tb1');
      tb.innerHTML = '';
      Object.entries(servidores).forEach(function(s) {
        tb.innerHTML += '<tr><td>' + s[1].nome + '</td><td><button class="btn btn-danger" onclick="deletarServidor(\'' + s[0] + '\')">Del</button></td></tr>';
      });
    }

    function renderPlanos() {
      var tb = document.getElementById('tb2');
      tb.innerHTML = '';
      Object.entries(planos).forEach(function(p) {
        tb.innerHTML += '<tr><td>' + p[1].nome + '</td><td>R$ ' + p[1].valor + '</td><td><button class="btn btn-danger" onclick="deletarPlano(\'' + p[0] + '\')">Del</button></td></tr>';
      });
    }

    function stats() {
      var a = 0, v = 0, h = 0, x = 0;
      var now = new Date();
      Object.values(clientes).forEach(function(c) {
        var d = Math.round((new Date(c.vencimento) - now) / (1000 * 60 * 60 * 24));
        if (d >= 4) a++;
        else if (d >= 1 && d <= 3) v++;
        else if (d === 0) h++;
        else x++;
      });
      document.getElementById('s0').textContent = a;
      document.getElementById('s1').textContent = v;
      document.getElementById('s2').textContent = h;
      document.getElementById('s3').textContent = x;

      var ra = 0, rv = 0, rh = 0, rx = 0;
      Object.values(clientes).forEach(function(c) {
        var val = parseFloat(c.valorPlano || 0);
        var d = Math.round((new Date(c.vencimento) - now) / (1000 * 60 * 60 * 24));
        if (d >= 4) ra += val;
        else if (d >= 1) rv += val;
        else rx += val;
      });
      document.getElementById('f0').textContent = 'R$ ' + (ra + rv + rx).toFixed(2);
      document.getElementById('f1').textContent = 'R$ ' + ra.toFixed(2);
      document.getElementById('f2').textContent = 'R$ ' + rv.toFixed(2);
      document.getElementById('f3').textContent = 'R$ ' + rx.toFixed(2);
    }

    function carregarClientesCobranca() {
      var s = document.getElementById('sel-cliente');
      s.innerHTML = '';
      Object.entries(clientes).forEach(function(c) {
        s.innerHTML += '<option value="' + c[0] + '">' + c[1].nome + '</option>';
      });
    }

    function enviarMsg() {
      var id = document.getElementById('sel-cliente').value;
      var msg = document.getElementById('txt-msg').value;
      if (!id || !msg) {
        toast('Preencha tudo!', true);
        return;
      }
      fetch('/api/enviar-manual', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids: [id], canal: 'todos', mensagem: msg })
      }).then(function(r) { return r.json(); }).then(function(d) {
        if (d.ok) {
          toast('Enviado!');
          document.getElementById('txt-msg').value = '';
        }
      }).catch(function() { toast('Erro', true); });
    }

    function toast(msg, err) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.toggle('error', err);
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2000);
    }

    db.ref('clientes').on('value', function(s) {
      clientes = s.val() || {};
      render();
    });

    db.ref('servidores').on('value', function(s) {
      servidores = s.val() || {};
      render();
    });

    db.ref('planos').on('value', function(s) {
      planos = s.val() || {};
      render();
    });
  </script>
</body>
</html>
