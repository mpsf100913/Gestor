<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ativar Notificações — Plano IPTV</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: white;
    border-radius: 16px;
    padding: 40px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  }
  .icon { font-size: 64px; margin-bottom: 20px; }
  h1 { color: #1a1a1a; margin-bottom: 10px; font-size: 28px; }
  .subtitle { color: #666; margin-bottom: 30px; line-height: 1.5; }
  .formulario { display: flex; flex-direction: column; gap: 15px; }
  button {
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .status { 
    padding: 16px; 
    border-radius: 8px; 
    margin-top: 20px; 
    display: none;
    font-size: 14px;
  }
  .status.sucesso {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
    display: block;
  }
  .status.erro {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
    display: block;
  }
  .loading { display: none; }
  .loading.ativo { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <div class="icon">🔔</div>
  <h1>Ativar Notificações</h1>
  <p class="subtitle">Receba avisos sobre o vencimento do seu plano IPTV</p>
  
  <div class="formulario">
    <button class="btn-primary" id="btnAtivar">
      <span id="btnTexto">🔔 Ativar Notificações</span>
      <span class="loading" id="btnLoading">⏳</span>
    </button>
  </div>

  <div class="status" id="status"></div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>

<script>
  // ============================================
  // CONFIGURAÇÃO
  // ============================================
  const firebaseConfig = {
    apiKey: "AIzaSyB5Y2BMqHIBDAhZoHFwDzdG-UuvPR1-FcQ",
    authDomain: "gestor-22b13.firebaseapp.com",
    databaseURL: "https://gestor-22b13-default-rtdb.firebaseio.com",
    projectId: "gestor-22b13",
    storageBucket: "gestor-22b13.firebasestorage.app",
    messagingSenderId: "124521158946",
    appId: "1:124521158946:web:06ea51762e01c571512d7b"
  };

  const VAPID_KEY = "BH4XFOg4RddXU-xPuEh3Loli2QiGk1XuXhX4K9jmDajsdMf3DkfgLJUcZ6Rhy62-KjZ7FKpbGyiS5YnTwUA5D9w";
  const DB_URL = firebaseConfig.databaseURL;

  // Inicializa Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ============================================
  // ELEMENTOS HTML
  // ============================================
  const btnAtivar = document.getElementById('btnAtivar');
  const btnTexto = document.getElementById('btnTexto');
  const btnLoading = document.getElementById('btnLoading');
  const statusDiv = document.getElementById('status');

  // ============================================
  // OBTER ID DO CLIENTE
  // ============================================
  const params = new URLSearchParams(window.location.search);
  const clienteId = params.get('id');

  if (!clienteId) {
    statusDiv.textContent = '❌ Erro: ID do cliente não fornecido na URL';
    statusDiv.classList.add('erro');
    btnAtivar.disabled = true;
  }

  // ============================================
  // ATIVAR NOTIFICAÇÕES
  // ============================================
  btnAtivar.addEventListener('click', async () => {
    btnAtivar.disabled = true;
    btnTexto.style.display = 'none';
    btnLoading.classList.add('ativo');
    statusDiv.className = 'status';
    statusDiv.textContent = '⏳ Processando...';

    try {
      console.log('🟦 1️⃣ Registrando service worker...');
      const registration = await navigator.serviceWorker.register('firebase-messaging-sw.js');
      console.log('✅ Service worker registrado');

      console.log('🟦 2️⃣ Solicitando permissão do navegador...');
      const permissao = await Notification.requestPermission();
      if (permissao !== 'granted') {
        throw new Error('Você negou a permissão de notificações. Aceite para continuar.');
      }
      console.log('✅ Permissão concedida');

      console.log('🟦 3️⃣ Gerando FCM token...');
      const messaging = firebase.messaging();
      const token = await messaging.getToken({
        vapidKey: VAPID_KEY,
        serviceWorkerRegistration: registration
      });

      if (!token) {
        throw new Error('Não foi possível gerar o token de notificação');
      }
      console.log('✅ Token gerado:', token.substring(0, 30) + '...');

      console.log('🟦 4️⃣ Salvando no Firebase...');
      console.log('   Cliente:', clienteId);
      console.log('   Token:', token.substring(0, 50) + '...');

      // Salva APENAS o fcmToken, nada mais
      const res = await fetch(`${DB_URL}/clientes/${clienteId}.json`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fcmToken: token })
      });

      console.log('   Response status:', res.status);
      if (!res.ok) {
        throw new Error(`Firebase retornou erro ${res.status}`);
      }

      const resData = await res.json();
      console.log('✅ Dados salvos no Firebase');
      console.log('   Response:', resData);

      console.log('\n🎉 SUCESSO! Notificações ativadas!');
      
      statusDiv.textContent = '✅ Notificações ativadas com sucesso! Você receberá avisos sobre seu plano.';
      statusDiv.classList.add('sucesso');
      btnTexto.textContent = '✅ Notificações Ativadas';
      btnTexto.style.display = 'inline';
      btnLoading.classList.remove('ativo');

    } catch (err) {
      console.error('❌ ERRO:', err.message);
      statusDiv.textContent = '❌ Erro: ' + err.message;
      statusDiv.classList.add('erro');
      btnTexto.style.display = 'inline';
      btnLoading.classList.remove('ativo');
      btnAtivar.disabled = false;
    }
  });

  // Listener para notificações quando app está em primeiro plano
  console.log('Aguardando mensagens push...');
  if ('serviceWorker' in navigator) {
    const messaging = firebase.messaging();
    messaging.onMessage((payload) => {
      console.log('📨 Notificação recebida em primeiro plano:', payload);
      const titulo = payload.notification?.title || 'Aviso';
      const opcoes = {
        body: payload.notification?.body || '',
        icon: '/icon-192.png',
        badge: '/icon-192.png',
      };
      navigator.serviceWorker.ready.then((registration) => {
        registration.showNotification(titulo, opcoes);
      });
    });
  }
</script>

</body>
</html>
