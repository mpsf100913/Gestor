<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ativar Notificações — IPTV</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-wrap">
  <div class="login-card" style="max-width: 420px;">
    <div class="login-signal">● SINAL ATIVO</div>
    <h1 id="tituloPagina">Ativar Notificações</h1>
    <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 24px; line-height: 1.5;" id="descricaoPagina">
      Receba um aviso automático quando seu plano estiver perto de vencer — direto no seu celular.
    </p>

    <div id="formularioAtivacao">
      <div class="field">
        <label style="font-size: 13px;">Email (opcional - receberá avisos também)</label>
        <input type="email" id="inputEmail" placeholder="seu@email.com">
      </div>

      <button class="btn btn-primary" id="btnAtivar">🔔 Ativar Notificações</button>
    </div>

    <div id="mensagemSucesso" style="display: none; text-align: center;">
      <p style="color: var(--success); font-size: 32px; margin-bottom: 12px;">✅</p>
      <p style="color: var(--text); font-size: 16px; font-weight: 600; margin-bottom: 8px;">Notificações Ativadas!</p>
      <p style="color: var(--text-dim); font-size: 13px; margin-bottom: 20px; line-height: 1.5;">
        Você vai receber avisos automáticos quando seu plano estiver vencendo.
      </p>
      <p style="color: var(--text-dim); font-size: 12px; margin-bottom: 16px;">
        Pode fechar esta janela agora.
      </p>
      <button class="btn btn-ghost" onclick="window.close()" style="font-size: 12px;">Fechar Janela</button>
    </div>

    <div class="error-msg" id="statusMsg"></div>
  </div>
</div>

<!-- SDKs do Firebase (versão compat, sem precisar de build) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
  // Pega o ID do cliente pela URL: ativar-notificacao.html?id=CLIENTE_ID
  const params = new URLSearchParams(window.location.search);
  const clienteId = params.get('id');

  const btnAtivar = document.getElementById('btnAtivar');
  const statusMsg = document.getElementById('statusMsg');
  const titulo = document.getElementById('tituloPagina');
  const descricao = document.getElementById('descricaoPagina');
  const inputEmail = document.getElementById('inputEmail');
  const formularioAtivacao = document.getElementById('formularioAtivacao');
  const mensagemSucesso = document.getElementById('mensagemSucesso');

  if (!clienteId) {
    titulo.textContent = 'Link inválido';
    descricao.textContent = 'Esse link de ativação não é válido. Fale com o suporte para receber um novo link.';
    formularioAtivacao.style.display = 'none';
  } else {
    firebase.initializeApp(firebaseConfig);
  }

  btnAtivar.addEventListener('click', async () => {
    if (!clienteId) return;
    btnAtivar.disabled = true;
    btnAtivar.textContent = 'Ativando...';
    statusMsg.textContent = '';

    try {
      // Registra o service worker (necessário pro FCM funcionar)
      const registration = await navigator.serviceWorker.register('firebase-messaging-sw.js');

      const messaging = firebase.messaging();

      // Pede permissão nativa do navegador
      const permissao = await Notification.requestPermission();
      if (permissao !== 'granted') {
        throw new Error('Permissão negada. Você precisa permitir notificações para continuar.');
      }

      // Gera o token único do dispositivo
      // IMPORTANTE: troque VAPID_KEY_AQUI pela chave gerada no Firebase (Cloud Messaging > Web Push certificates)
      const token = await messaging.getToken({
        vapidKey: 'VAPID_KEY_AQUI',
        serviceWorkerRegistration: registration
      });

      if (!token) throw new Error('Não foi possível gerar o token');

      // Prepara dados pra salvar
      const dadosAtualizacao = { fcmToken: token };
      const email = inputEmail.value.trim();
      if (email) {
        dadosAtualizacao.emailNotificacao = email;
      }

      // Salva o token + email (se fornecido) no Firebase, vinculado ao cliente
      await fetch(`${DB_URL}/clientes/${clienteId}.json`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dadosAtualizacao)
      });

      formularioAtivacao.style.display = 'none';
      mensagemSucesso.style.display = 'block';

    } catch (err) {
      console.error(err);
      statusMsg.textContent = 'Erro: ' + err.message + '. Verifique e tente novamente.';
      btnAtivar.disabled = false;
      btnAtivar.textContent = '🔔 Ativar Notificações';
    }
  });

  // Permite ativar com Enter no campo de email
  inputEmail.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') btnAtivar.click();
  });
</script>

</body>
</html>
