<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Gestão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #0a0e27;
    --bg-card: #131829;
    --border: #1e2847;
    --text: #e8eef7;
    --text-dim: #a8b2cc;
    --cyan: #00D9FF;
    --roxo: #7C3AED;
    --laranja: #FF6B35;
    --verde: #00D084;
    --amarelo: #FFA500;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-wrap {
    width: 100%;
    max-width: 400px;
  }

  .login-card {
    background: linear-gradient(135deg, var(--bg-card) 0%, rgba(124, 58, 237, 0.05) 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 32px;
    backdrop-filter: blur(10px);
  }

  .login-signal {
    font-size: 12px;
    font-weight: 600;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .login-signal::before {
    content: '●';
    color: var(--cyan);
    font-size: 8px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 32px;
    background: linear-gradient(135deg, var(--cyan) 0%, var(--roxo) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .pin-input {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 16px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.3s ease;
  }

  .pin-input:focus {
    outline: none;
    border-color: var(--cyan);
    background: rgba(0, 217, 255, 0.05);
    box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
  }

  .pin-input::placeholder {
    color: var(--text-dim);
  }

  .btn {
    width: 100%;
    padding: 14px 16px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: 'Inter', sans-serif;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--cyan) 0%, var(--roxo) 100%);
    color: #000;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0, 217, 255, 0.3);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  .error-msg {
    margin-top: 16px;
    font-size: 13px;
    color: #ff6b6b;
    text-align: center;
    min-height: 20px;
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-signal">SINAL ATIVO</div>
    <h1>Painel de Cobrança</h1>
    <input type="password" id="pinInput" class="pin-input" maxlength="8" placeholder="••••" inputmode="numeric" autofocus>
    <button class="btn btn-primary" id="btnEntrar">Entrar</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<script>
  // Configuração do Firebase (embutida)
  const firebaseConfig = {
    apiKey: "AIzaSyB5Y2BMqHIBDAhZoHFwDzdG-UuvPR1-FcQ",
    authDomain: "gestor-22b13.firebaseapp.com",
    databaseURL: "https://gestor-22b13-default-rtdb.firebaseio.com",
    projectId: "gestor-22b13",
    storageBucket: "gestor-22b13.firebasestorage.app",
    messagingSenderId: "124521158946",
    appId: "1:124521158946:web:06ea51762e01c571512d7b"
  };

  // PIN correto
  const ADMIN_PIN = "891322";

  // Lógica de login
  const input = document.getElementById('pinInput');
  const btn = document.getElementById('btnEntrar');
  const errorMsg = document.getElementById('loginError');

  function tentarEntrar() {
    if (input.value === ADMIN_PIN) {
      sessionStorage.setItem('admin_auth', 'ok');
      window.location.href = 'admin.html';
    } else {
      errorMsg.textContent = 'PIN incorreto.';
      input.value = '';
      input.focus();
    }
  }

  btn.addEventListener('click', tentarEntrar);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') tentarEntrar();
  });
</script>

</body>
</html>
